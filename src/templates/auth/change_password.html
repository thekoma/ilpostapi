{% extends "auth/base_auth.html" %}
{% block title %}Cambia Password - ilPost Podcasts{% endblock %}
{% block content %}
    <h1>Cambia Password</h1>
    <p class="subtitle">{{ user.username }}</p>

    {% if error %}
    <div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success"><i class="fas fa-check-circle"></i> {{ success }}</div>
    {% endif %}

    <form method="POST" action="/auth/change-password">
        <div class="form-group">
            <label for="old_password">Vecchia Password</label>
            <input type="password" id="old_password" name="old_password" required>
        </div>
        <div class="form-group">
            <label for="new_password">Nuova Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="8">
        </div>
        <div class="form-group">
            <label for="new_password_confirm">Conferma Nuova Password</label>
            <input type="password" id="new_password_confirm" name="new_password_confirm" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-key"></i> Aggiorna Password
        </button>
    </form>

    <div class="auth-links">
        <a href="/profile"><i class="fas fa-arrow-left"></i> Torna al profilo</a>
    </div>
{% endblock %}
