<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ilPost Podcasts{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='/images/favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        .auth-container {
            max-width: 420px;
            margin: 80px auto;
            padding: 0 20px;
        }
        .auth-card {
            background: var(--card-background);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px var(--shadow-color);
        }
        .auth-card h1 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .auth-card p.subtitle {
            text-align: center;
            color: var(--subtext0);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--surface);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--background-color);
            color: var(--text-color);
            font-family: var(--font-sans);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: var(--font-sans);
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary {
            background: var(--primary-color);
            color: white;
            width: 100%;
        }
        .btn-oidc {
            background: var(--surface);
            color: var(--text-color);
            width: 100%;
            margin-top: 0.5rem;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 1.2rem 0;
            color: var(--subtext0);
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--surface);
        }
        .divider span { padding: 0 0.8rem; }
        .alert {
            padding: 0.7rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .alert-error {
            background: rgba(210, 15, 57, 0.1);
            color: var(--red, #d20f39);
            border: 1px solid rgba(210, 15, 57, 0.2);
        }
        .alert-success {
            background: rgba(64, 160, 43, 0.1);
            color: var(--green, #40a02b);
            border: 1px solid rgba(64, 160, 43, 0.2);
        }
        .auth-links {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
        }
        .auth-links a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .auth-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="{{ url_for('static', path='/js/theme.js') }}"></script>
    <script>
        const savedTheme = getCookie('theme') || 'macchiato';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
