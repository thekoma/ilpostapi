{% extends "auth/base_auth.html" %}
{% block title %}Reimposta Password - ilPost Podcasts{% endblock %}
{% block content %}
    <h1>Reimposta Password</h1>

    {% if error %}
    <div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    {% if valid %}
    <form method="POST" action="/auth/reset-password/{{ token }}">
        <div class="form-group">
            <label for="new_password">Nuova Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="8">
        </div>
        <div class="form-group">
            <label for="new_password_confirm">Conferma Nuova Password</label>
            <input type="password" id="new_password_confirm" name="new_password_confirm" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-key"></i> Reimposta Password
        </button>
    </form>
    {% endif %}

    <div class="auth-links">
        <a href="/auth/login"><i class="fas fa-arrow-left"></i> Torna al login</a>
    </div>
{% endblock %}
